apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
      # Pin to a known stable version; update deliberately
      version: "1.82.x"
  values:
    # OAuth credentials are provided via an existing K8s secret.
    # The operator expects a secret named "operator-oauth" in its namespace
    # with keys "client_id" and "client_secret".
    oauth:
      clientId: ""
      clientSecret: ""
    # We provide credentials via ExternalSecret instead of Helm values.
    # The operator looks for secret "operator-oauth" by default.
    operatorConfig:
      defaultTags:
        - "tag:k8s"
