apiVersion: v1
kind: Service
metadata:
  name: argo-rollouts-dashboard
  namespace: argo-rollouts
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
  labels:
    app.kubernetes.io/name: argo-rollouts-dashboard
    app.kubernetes.io/part-of: argo-rollouts
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: argo-rollouts-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 3100
      protocol: TCP
