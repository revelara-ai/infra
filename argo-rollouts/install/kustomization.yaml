apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo-rollouts

resources:
  - namespace.yaml
  - https://github.com/argoproj/argo-rollouts/releases/download/v1.8.4/install.yaml
  - dashboard.yaml
  - dashboard-service.yaml

patches:
  - target:
      group: rbac.authorization.k8s.io
      version: v1
      kind: ClusterRole
      name: argo-rollouts
    patch: |
      - op: add
        path: /rules/-
        value:
          apiGroups: [""]
          resources: ["namespaces"]
          verbs: ["get", "list", "watch"]
