apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-rollouts-dashboard
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/name: argo-rollouts-dashboard
    app.kubernetes.io/part-of: argo-rollouts
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argo-rollouts-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argo-rollouts-dashboard
    spec:
      serviceAccountName: argo-rollouts
      containers:
        - name: dashboard
          image: quay.io/argoproj/argo-rollouts:v1.8.4
          command:
            - /bin/rollouts-controller
          args:
            - dashboard
          ports:
            - containerPort: 3100
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
