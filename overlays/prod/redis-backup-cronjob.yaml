apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup
  namespace: prod
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: relynce
          containers:
            - name: redis-backup
              image: google/cloud-sdk:slim
              command:
                - /bin/sh
                - -c
                - |
                  apt-get update -qq && apt-get install -y -qq redis-tools > /dev/null 2>&1
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  redis-cli -h redis.prod.svc.cluster.local --rdb /tmp/dump.rdb
                  gsutil cp /tmp/dump.rdb gs://relynce-backups-prod/redis/dump-${TIMESTAMP}.rdb
                  echo "Redis backup completed: dump-${TIMESTAMP}.rdb"
          restartPolicy: OnFailure
